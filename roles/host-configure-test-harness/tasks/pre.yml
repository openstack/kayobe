---
- name: Ensure python3 and setuptools are installed
  package:
    name:
      - python3
      - python3-setuptools
  become: true

- name: Ensure testinfra is installed
  pip:
    name:
      - distro
      - pytest-testinfra
      - pytest-html
    virtualenv: "{{ host_configure_testinfra_venv }}"
    virtualenv_command: python3 -m venv
