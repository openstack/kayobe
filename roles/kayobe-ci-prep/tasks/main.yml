---
- name: Install dbus for debian system
  apt:
    name: dbus
  when:
    - ansible_facts.os_family == 'Debian'
  become: true

- block:
    # NOTE(mgoddard): The CentOS image used in CI has epel-release installed,
    # but the configure-mirrors role used by Zuul disables epel. We no longer
    # install EPEL by default, but let's just be sure it's disabled.
    - name: Ensure dnf-plugins-core is installed
      package:
        name: dnf-plugins-core
        state: present

    - name: Enable the EPEL repository
      command: dnf config-manager --disable epel

    # NOTE(priteau): Remove me when newer docker-ce package is out
    - name: Install python3-dnf-plugin-versionlock
      become: true
      ansible.builtin.dnf:
        name: python3-dnf-plugin-versionlock
        state: present

    - name: Pin docker-ce to 29.5.0
      become: true
      community.general.dnf_versionlock:
        name: "docker-ce-3:29.5.1-1.el{{ ansible_facts.distribution_major_version }}"
        state: excluded
        raw: true

  when: ansible_facts.os_family == 'RedHat'
  become: true
