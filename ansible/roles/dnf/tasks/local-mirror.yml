---
- name: Copy Rocky/CentOS repo templates
  vars:
    repo_file_prefix: "{{ ansible_facts.distribution | lower }}"
  template:
    src: "{{ item }}.j2"
    dest: /etc/yum.repos.d/{{ item }}
    owner: root
    group: root
    mode: 0664
  become: True
  when: (role_path ~ '/templates/' ~ item ~ '.j2') is exists
  loop:
    - "{{ repo_file_prefix }}.repo"
    - "{{ repo_file_prefix }}-extras.repo"
    - "{{ repo_file_prefix }}-addons.repo"
    - "{{ repo_file_prefix }}-devel.repo"

- name: Update cache
  dnf:
    name: []
    update_cache: yes
  become: True

# NOTE(mgoddard): Install epel-release to ensure it does not get installed
# later and override our repo file.
- name: Install epel-release
  dnf:
    name: epel-release
    state: installed
  become: True
  when: dnf_install_epel | bool

- name: Copy EPEL repo templates
  template:
    src: "{{ item }}.j2"
    dest: /etc/yum.repos.d/{{ item }}
    owner: root
    group: root
    mode: 0664
  become: True
  loop:
    - epel.repo
  when: dnf_install_epel | bool

- name: Update cache
  dnf:
    name: []
    update_cache: yes
  become: True
  when: dnf_install_epel | bool
